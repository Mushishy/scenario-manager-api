  /range/shared:
    get:
      summary: Check range sharing status for SHARED pool
      description: |
        Check the range sharing status for a SHARED pool to determine if all users are properly shared to their main users.
        
        The function:
        1. Gets all users from the specified SHARED pool
        2. Queries the Ludus API for current range access permissions
        3. Checks if each user in the pool is sharing their range with their assigned main user
        4. Returns overall sharing status for the pool
        
        Response combinations:
        - `{"shared": true, "unshared": false}` - ALL pool users have shared their ranges with their respective main users
        - `{"shared": false, "unshared": false}` - SOME pool users have shared their ranges, but not all
        - `{"shared": false, "unshared": true}` - NO pool users have shared their ranges with any main users
      tags:
        - Ludus Range Sharing
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9]{6}$"
          description: Pool ID (must be of type SHARED)
          example: "ABC123"
      responses:
        '200':
          description: Range sharing status result for the SHARED pool
          content:
            application/json:
              schema:
                type: object
                properties:
                  shared:
                    type: boolean
                    description: True if ALL pool users have shared their ranges with their respective main users
                    example: true
                  unshared:
                    type: boolean
                    description: True if NO pool users have shared their ranges with any main users
                    example: false
                required:
                  - shared
                  - unshared
              examples:
                no_sharing:
                  summary: No users in pool have shared their ranges
                  value:
                    shared: false
                    unshared: true
                partial_sharing:
                  summary: Some users in pool have shared, but not all
                  value:
                    shared: false
                    unshared: false
                complete_sharing:
                  summary: All users in pool have shared their ranges with their main users
                  value:
                    shared: true
                    unshared: false
        '400':
          description: Bad Request - Invalid pool ID or pool is not of type SHARED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Pool Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error - Failed to communicate with Ludus API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /range/share/user:
    post:
      summary: Share ranges from a user to pool users
      description: |
        Shares ranges from a specified source user to users in a pool.
        
        The behavior differs based on pool type:
        - For SHARED pools: Shares from targetUserId to all main users in the pool
        - For INDIVIDUAL pools: Shares from targetUserId to all regular users in the pool
        
        This allows an instructor or admin to grant their range access to pool users.
      tags:
        - Ludus Range Sharing
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9]{6}$"
          description: Pool ID containing the target users
          example: "ABC123"
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          description: Source user ID who will share their ranges to pool users
          example: "instructor1"
      responses:
        '200':
          description: Share operation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                          example: "instructor1"
                        response:
                          type: object
                        error:
                          type: string
                required:
                  - results
        '400':
          description: Bad Request - Invalid pool ID or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Pool Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /range/unshare/user:
    post:
      summary: Revoke range sharing from a user to pool users
      description: |
        Revokes range sharing from a specified source user to users in a pool.
        
        The behavior differs based on pool type:
        - For SHARED pools: Revokes sharing from targetUserId to all main users in the pool
        - For INDIVIDUAL pools: Revokes sharing from targetUserId to all regular users in the pool
        
        This allows revoking previously granted range access.
      tags:
        - Ludus Range Sharing
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9]{6}$"
          description: Pool ID containing the target users
          example: "ABC123"
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          description: Source user ID whose range sharing will be revoked from pool users
          example: "instructor1"
      responses:
        '200':
          description: Unshare operation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                          example: "instructor1"
                        response:
                          type: object
                        error:
                          type: string
                required:
                  - results
        '400':
          description: Bad Request - Invalid pool ID or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Pool Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /range/shared/user:
    get:
      summary: Check comprehensive range sharing status from a user to pool users
      description: |
        Checks the detailed range sharing status from a specified source user to users in a pool.
        
        This endpoint provides comprehensive sharing status information by checking:
        1. Whether all pool users exist in the Ludus range access list
        2. Whether the specified targetUserId has shared ranges to each pool user
        3. Overall sharing status indicators
        
        The behavior differs based on pool type:
        - For SHARED pools: Checks sharing from targetUserId to all main users in the pool
        - For INDIVIDUAL pools: Checks sharing from targetUserId to all regular users in the pool
        
        Returns both granular and summary sharing status information.
      tags:
        - Ludus Range Sharing
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9]{6}$"
          description: Pool ID containing the target users to check sharing status for
          example: "ABC123"
        - name: targetUserId
          in: query
          required: true
          schema:
            type: string
          description: Source user ID to check sharing status from (the user who may have shared their ranges)
          example: "EXAMINER1"
      responses:
        '200':
          description: Range sharing status information with comprehensive analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  shared:
                    type: boolean
                    description: |
                      True if ALL conditions are met:
                      - All pool users exist in the Ludus range access list
                      - The targetUserId has shared ranges to ALL pool users
                    example: true
                  unshared:
                    type: boolean
                    description: |
                      True if the targetUserId has NOT shared ranges to ANY pool users.
                      This is the inverse of anyShared (unshared = !anyShared).
                    example: false
                required:
                  - shared
                  - unshared
              examples:
                fully_shared:
                  summary: All users have access
                  description: targetUserId has shared to all pool users and all users exist in range access list
                  value:
                    shared: true
                    unshared: false
                partially_shared:
                  summary: Some users have access
                  description: targetUserId has shared to some but not all pool users
                  value:
                    shared: false
                    unshared: false
                not_shared:
                  summary: No users have access
                  description: targetUserId has not shared to any pool users
                  value:
                    shared: false
                    unshared: true
                missing_users:
                  summary: Pool users missing from range access list
                  description: Some pool users don't exist in the Ludus range access list
                  value:
                    shared: false
                    unshared: false
        '400':
          description: Bad Request - Invalid pool ID or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_pool_id:
                  summary: Missing poolId parameter
                  value:
                    error: "poolId is required"
                missing_target_user:
                  summary: Missing targetUserId parameter  
                  value:
                    error: "targetUserId is required"
                invalid_pool:
                  summary: Invalid pool ID format
                  value:
                    error: "Pool not found"
        '404':
          description: Pool Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                pool_not_found:
                  summary: Specified pool does not exist
                  value:
                    error: "Pool not found"
        '500':
          description: Internal Server Error - Failed to retrieve range access data from Ludus API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                api_error:
                  summary: Failed to retrieve from Ludus API
                  value:
                    error: "Internal Server Error"
                format_error:
                  summary: Invalid response format from Ludus API
                  value:
                    error: "Invalid response format"

  # Ludus Range Deployment
  /range/deploy:
    post:
      summary: Deploy range for pool users (async)
      description: |
        Start asynchronous deployment of range infrastructure for all users in a pool.
        The deployment runs in the background with batched processing based on concurrentRequests.
        Use /range/status to monitor deployment progress.
      tags:
        - Ludus Range Deployment
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9]{6}$"
          description: Pool ID to get users from
          example: "ABC123"
        - name: concurrentRequests
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 10
          description: Number of concurrent deployment requests per batch
          example: 3
      responses:
        '200':
          description: Deployment started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  poolId:
                    type: string
                    example: "ABC123"
                  userCount:
                    type: integer
                    example: 4
                  concurrentRequests:
                    type: integer
                    example: 3
        '400':
          description: Bad Request (invalid poolId or concurrentRequests)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Pool Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /range/status:
