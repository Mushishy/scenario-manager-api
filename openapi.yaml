  /range/testing/status:
    get:
      summary: Get testing status for a pool
      description: Check if all users in the pool have the same testing status and return the common status
      parameters:
        - name: poolId
          in: query
          required: true
          description: The ID of the pool to check testing status for
          schema:
            type: string
            example: "U8b1hP"
      tags:
        - Ludus Range Testing
      responses:
        '200':
          description: Testing status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  allSame:
                    type: boolean
                    description: Whether all users have the same testing status
                    example: true
                  testingEnabled:
                    type: boolean
                    description: The common testing status (only meaningful if allSame is true)
                    example: true
              examples:
                all_enabled:
                  summary: All users have testing enabled
                  value:
                    allSame: true
                    testingEnabled: true
                all_disabled:
                  summary: All users have testing disabled
                  value:
                    allSame: true
                    testingEnabled: false
                mixed_status:
                  summary: Users have different testing statuses
                  value:
                    allSame: false
                    testingEnabled: false
                no_users:
                  summary: No valid users found
                  value:
                    allSame: false
                    testingEnabled: false
        '400':
          description: Bad request - invalid pool ID or other parameter error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid pool ID"
        '404':
          description: Pool not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Not Found"

  /stats/proxmox:
    get:
      summary: Get Proxmox cluster statistics
      description: Retrieves comprehensive statistics about the Proxmox cluster including users, templates, VMs, topologies, scenarios, roles, pools, and node information
      operationId: getProxmoxStatistics
      tags: 
        - Proxmox
      responses:
        '200':
          description: Successfully retrieved Proxmox statistics
          content:
            application/json:
              schema:
                type: object
                required:
                  - users
                  - templates
                  - vms
                  - numberOfTopologies
                  - numberOfScenarios
                  - numberOfRoles
                  - numberOfPools
                  - cpuUsagePercentage
                  - maxCpu
                  - memoryUsedGiB
                  - memoryTotalGiB
                  - memoryFreeGiB
                  - diskUsedGiB
                  - diskTotalGiB
                  - uptimeFormatted
                properties:
                  users:
                    type: integer
                    description: Total number of users (pools) in the Proxmox cluster (excluding ADMIN and SHARED)
                    minimum: 0
                    example: 5
                  templates:
                    type: integer
                    description: Total number of VM templates available
                    minimum: 0
                    example: 6
                  vms:
                    type: integer
                    description: Total number of virtual machines (excluding templates)
                    minimum: 0
                    example: 4
                  numberOfTopologies:
                    type: integer
                    description: Total number of topology configurations available
                    minimum: 0
                    example: 12
                  numberOfScenarios:
                    type: integer
                    description: Total number of CTFd scenarios available
                    minimum: 0
                    example: 8
                  numberOfRoles:
                    type: integer
                    description: Total number of Ansible roles available in Ludus
                    minimum: 0
                    example: 25
                  numberOfPools:
                    type: integer
                    description: Total number of pools in the system
                    minimum: 0
                    example: 7
                  cpuUsagePercentage:
                    type: number
                    format: double
                    description: Current CPU usage as a percentage
                    minimum: 0
                    maximum: 100
                    example: 0.17
                  maxCpu:
                    type: integer
                    description: Maximum number of CPU cores available
                    minimum: 1
                    example: 16
                  memoryUsedGiB:
                    type: number
                    format: double
                    description: Currently used memory in GiB (Gibibytes)
                    minimum: 0
                    example: 6.24
                  memoryTotalGiB:
                    type: number
                    format: double
                    description: Total memory capacity in GiB (Gibibytes)
                    minimum: 0
                    example: 62.76
                  memoryFreeGiB:
                    type: number
                    format: double
                    description: Available memory in GiB (Gibibytes)
                    minimum: 0
                    example: 56.53
                  diskUsedGiB:
                    type: number
                    format: double
                    description: Currently used disk space in GiB (Gibibytes)
                    minimum: 0
                    example: 66.51
                  diskTotalGiB:
                    type: number
                    format: double
                    description: Total disk capacity in GiB (Gibibytes)
                    minimum: 0
                    example: 822.43
                  uptimeFormatted:
                    type: string
                    description: Human-readable uptime format (e.g., "2w 4d 3h")
                    pattern: '^(\d+w\s)?(\d+d\s)?(\d+h)?$'
                    example: "2w 4d 3h"
              example:
                users: 5
                templates: 6
                vms: 4
                numberOfTopologies: 12
                numberOfScenarios: 8
                numberOfRoles: 25
                numberOfPools: 7
                cpuUsagePercentage: 0.17
                maxCpu: 16
                memoryUsedGiB: 6.24
                memoryTotalGiB: 62.76
                memoryFreeGiB: 56.53
                diskUsedGiB: 66.51
                diskTotalGiB: 822.43
                uptimeFormatted: "2w 4d 3h"
        '401':
          description: Unauthorized - Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error - Proxmox configuration missing or connection failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                
  /topology/ctfd:
    post:
      summary: Create CTFd topology from template
      description: Creates a new CTFd topology by processing the ctfd_topology.yml template with provided configuration values and default values for optional parameters
      tags:
        - Topology
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topologyName
                - scenarioId
                - poolId
              properties:
                topologyName:
                  type: string
                  minLength: 1
                  description: Name for the topology (will be used as filename prefix)
                  example: "my-competition"
                scenarioId:
                  type: string
                  minLength: 1
                  description: ID of the scenario definition (ZIP file)
                  example: "ABC123"
                poolId:
                  type: string
                  minLength: 1
                  description: ID of the scenario definition data (JSON file)
                  example: "DEF456"
                usernameConfig:
                  type: string
                  description: Username used in the imported scenario definition
                  default: "admin"
                  example: "admin"
                passwordConfig:
                  type: string
                  description: Password used in the imported scenario definition
                  default: "admin"
                  example: "password123"
                adminUsername:
                  type: string
                  description: Username of the new administrator (must be different from usernameConfig)
                  default: "supervisor"
                  example: "supervisor"
                adminPassword:
                  type: string
                  description: Password of the new administrator
                  default: "admin"
                  example: "newpassword"
                ctfName:
                  type: string
                  description: Name of the CTF (if empty, name from scenario is used)
                  default: ""
                  example: "My CTF Competition"
                ctfDescription:
                  type: string
                  description: Description of the CTF (if empty, description from scenario is used)
                  default: ""
                  example: "A challenging CTF event"
                challengeVisibility:
                  type: string
                  enum: ["private", "public"]
                  description: Challenge visibility setting
                  default: "private"
                  example: "private"
                accountVisibility:
                  type: string
                  enum: ["private", "public"]
                  description: Account visibility setting
                  default: "private"
                  example: "private"
                scoreVisibility:
                  type: string
                  enum: ["private", "public"]
                  description: Score visibility setting
                  default: "private"
                  example: "public"
                registrationVisibility:
                  type: string
                  enum: ["private", "public"]
                  description: Registration visibility setting
                  default: "private"
                  example: "public"
                allowNameChanges:
                  type: string
                  enum: ["no", "yes"]
                  description: Whether name changing is allowed
                  default: "no"
                  example: "yes"
                allowTeamCreation:
                  type: string
                  enum: ["no", "yes"]
                  description: Whether users can create their own teams
                  default: "no"
                  example: "yes"
                allowTeamDisbanding:
                  type: string
                  enum: ["no", "yes"]
                  description: Whether users can disband their teams
                  default: "no"
                  example: "no"
                confStartTime:
                  type: string
                  description: CTF start time in DD/MM/YYYY HH:MM format (empty for no time limit)
                  pattern: '^$|^\d{2}/\d{2}/\d{4} \d{2}:\d{2}$'
                  default: ""
                  example: "20/07/2025 15:30"
                confStopTime:
                  type: string
                  description: CTF stop time in DD/MM/YYYY HH:MM format (empty for no time limit)
                  pattern: '^$|^\d{2}/\d{2}/\d{4} \d{2}:\d{2}$'
                  default: ""
                  example: "21/07/2025 15:30"
                timeZone:
                  type: string
                  description: Timezone for start/stop time calculations
                  default: "Europe/Vienna"
                  example: "Europe/Vienna"
                allowViewingAfter:
                  type: string
                  enum: ["no", "yes"]
                  description: Whether users can view CTFd data after CTF ends
                  default: "yes"
                  example: "yes"
              additionalProperties: false
            example:
              topologyName: "my-competition"
              scenarioId: "ABC123"
              poolId: "DEF456"
      responses:
        '200':
          description: CTFd topology created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "CTFd topology created successfully"
                  topologyId:
                    type: string
                    description: Generated unique topology ID
                    example: "XYZ789"
                  topologyName:
                    type: string
                    description: Generated topology filename
                    example: "ctfd_my-competition.yml"
              example:
                message: "CTFd topology created successfully"
                topologyId: "XYZ789"
                topologyName: "ctfd_my-competition.yml"
        '400':
          description: Bad Request - Invalid request body or validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - Scenario or Pool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error - Failed to create topology
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'